version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL databases (one per service)
  # ─────────────────────────────────────────────
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Deepak@2005"
      POSTGRES_DB: user_db
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - youtube-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  content-db:
    image: postgres:15-alpine
    container_name: content-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Deepak@2005"
      POSTGRES_DB: content_db
    volumes:
      - content_db_data:/var/lib/postgresql/data
    networks:
      - youtube-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  progress-db:
    image: postgres:15-alpine
    container_name: progress-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Deepak@2005"
      POSTGRES_DB: progress_db
    volumes:
      - progress_db_data:/var/lib/postgresql/data
    networks:
      - youtube-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-db:
    image: postgres:15-alpine
    container_name: analytics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Deepak@2005"
      POSTGRES_DB: analytics_db
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    networks:
      - youtube-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Microservices
  # ─────────────────────────────────────────────
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      DATABASE_URL: postgresql://postgres:Deepak%402005@user-db:5432/user_db
      SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - youtube-net
    restart: unless-stopped

  content-service:
    build:
      context: ./services/content-service
      dockerfile: Dockerfile
    container_name: content-service
    environment:
      DATABASE_URL: postgresql://postgres:Deepak%402005@content-db:5432/content_db
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      SERVICE_PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      content-db:
        condition: service_healthy
    networks:
      - youtube-net
    restart: unless-stopped

  progress-service:
    build:
      context: ./services/progress-service
      dockerfile: Dockerfile
    container_name: progress-service
    environment:
      DATABASE_URL: postgresql://postgres:Deepak%402005@progress-db:5432/progress_db
      CONTENT_SERVICE_URL: http://content-service:8002
      SERVICE_PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      progress-db:
        condition: service_healthy
      content-service:
        condition: service_started
    networks:
      - youtube-net
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    environment:
      DATABASE_URL: postgresql://postgres:Deepak%402005@analytics-db:5432/analytics_db
      SERVICE_PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      analytics-db:
        condition: service_healthy
    networks:
      - youtube-net
    restart: unless-stopped

  recommendation-service:
    build:
      context: ./services/recommendation-service
      dockerfile: Dockerfile
    container_name: recommendation-service
    environment:
      PROGRESS_SERVICE_URL: http://progress-service:8003
      CONTENT_SERVICE_URL: http://content-service:8002
      ANALYTICS_SERVICE_URL: http://analytics-service:8004
      SERVICE_PORT: 8005
    ports:
      - "8005:8005"
    depends_on:
      - progress-service
      - content-service
      - analytics-service
    networks:
      - youtube-net
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      USER_SERVICE_URL: http://user-service:8001
      CONTENT_SERVICE_URL: http://content-service:8002
      PROGRESS_SERVICE_URL: http://progress-service:8003
      ANALYTICS_SERVICE_URL: http://analytics-service:8004
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:8005
      GATEWAY_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - content-service
      - progress-service
      - analytics-service
      - recommendation-service
    networks:
      - youtube-net
    restart: unless-stopped

volumes:
  user_db_data:
  content_db_data:
  progress_db_data:
  analytics_db_data:

networks:
  youtube-net:
    driver: bridge
